name: Publish to NuGet

on:
  release:
    types: [published]  # triggers when you publish a GitHub release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore
        run: cd src/BoDraw && dotnet restore

      - name: Build
        run: cd src/BoDraw && dotnet build --configuration Release --no-restore

      - name: Pack
        run: |
            VERSION=${{ github.event.release.tag_name }}
            cd src/BoDraw && dotnet pack --configuration Release --no-build --output ./nupkg -p:Version=${VERSION#v}

      - name: Push to NuGet
        run: cd src/BoDraw && dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json